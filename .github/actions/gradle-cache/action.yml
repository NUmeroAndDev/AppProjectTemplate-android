name: Setup Android Gradle Cache
description: |
  Setup gradle cache
  Library caches are shared across workflows, while build caches are separated by workflow and job.

inputs:
  restore-only:
    description: |
      If true, it always performs cache reads only (no writes).
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - shell: bash
      run: echo "WEEK=$(date +%W)" >> $GITHUB_ENV

    - name: Restore and save Gradle library cache
      if: inputs.restore-only != 'true' && github.ref == 'refs/heads/main'
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: |
          ~/.gradle/caches/modules-*
          ~/.gradle/caches/transforms-*
          ~/.gradle/caches/jars-*
          ~/.gradle/wrapper/
        key: gradle-libs-${{ hashFiles('**/gradle-wrapper.properties') }}-${{ hashFiles('**/libs.versions.toml', '**/*.gradle.kts') }}
        restore-keys: |
          gradle-libs-${{ hashFiles('**/gradle-wrapper.properties') }}-

    - name: Restore Gradle library cache
      if: inputs.restore-only == 'true' || github.ref != 'refs/heads/main'
      uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: |
          ~/.gradle/caches/modules-*
          ~/.gradle/caches/transforms-*
          ~/.gradle/caches/jars-*
          ~/.gradle/wrapper/
        key: gradle-libs-${{ hashFiles('**/gradle-wrapper.properties') }}-${{ hashFiles('**/libs.versions.toml', '**/*.gradle.kts') }}
        restore-keys: |
          gradle-libs-${{ hashFiles('**/gradle-wrapper.properties') }}-

    - name: Restore and save Gradle build cache
      if: inputs.restore-only != 'true' && github.ref == 'refs/heads/main'
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: |
          ~/.gradle/caches/build-cache-*
        key: gradle-build-${{ github.job }}-${{ env.WEEK }}
        restore-keys: |
          gradle-build-${{ github.job }}-

    - name: Restore Gradle build cache
      if: inputs.restore-only == 'true' || github.ref != 'refs/heads/main'
      uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: |
          ~/.gradle/caches/build-cache-*
        key: gradle-build-${{ github.job }}-${{ env.WEEK }}
        restore-keys: |
          gradle-build-${{ github.job }}-
